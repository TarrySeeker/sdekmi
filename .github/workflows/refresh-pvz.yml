name: Refresh PVZ snapshot

on:
  schedule:
    # Every Monday at 03:00 UTC (06:00 MSK) — outside peak traffic.
    - cron: '0 3 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild assets/pvz.json
        run: node scripts/build-pvz.mjs

      - name: Commit if changed
        run: |
          if ! git diff --quiet assets/pvz.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/pvz.json
            git commit -m "Refresh PVZ snapshot"
            git push
          else
            echo "pvz.json unchanged — nothing to commit"
          fi
